name: Build APK UpAnime+

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar dependências
        run: npm ci

      - name: Build web (Vite)
        run: npm run build
        env:
          VITE_CONSUMET_URL: ${{ secrets.VITE_CONSUMET_URL }}

      - name: Instalar Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Inicializar Android
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Configurar tela cheia no Android
        run: |
          # Tema fullscreen imersivo
          cat > android/app/src/main/res/values/styles.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowContentOverlay">@null</item>
                  <item name="android:statusBarColor">@android:color/transparent</item>
                  <item name="android:navigationBarColor">@android:color/black</item>
                  <item name="colorPrimary">#E53935</item>
                  <item name="colorPrimaryDark">#B71C1C</item>
                  <item name="colorAccent">#E53935</item>
              </style>
              <style name="AppTheme.NoActionBarLaunch" parent="AppTheme">
                  <item name="android:background">@null</item>
              </style>
          </resources>
          XML

          # Modo imersivo total no MainActivity
          MAIN="android/app/src/main/java/io/upanime/app/MainActivity.java"
          if [ -f "$MAIN" ]; then
            sed -i '/import com.getcapacitor.BridgeActivity/a import android.os.Build;\nimport android.view.View;\nimport android.view.WindowInsets;\nimport android.view.WindowInsetsController;\nimport android.view.WindowManager;' "$MAIN"
            sed -i '/super.onCreate/a \
              // Tela cheia imersiva\
              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {\
                getWindow().getInsetsController().hide(WindowInsets.Type.statusBars() | WindowInsets.Type.navigationBars());\
                getWindow().getInsetsController().setSystemBarsBehavior(WindowInsetsController.BEHAVIOR_SHOW_TRANSIENT_BARS_BY_SWIPE);\
              } else {\
                getWindow().getDecorView().setSystemUiVisibility(\
                  View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY | View.SYSTEM_UI_FLAG_FULLSCREEN | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION | View.SYSTEM_UI_FLAG_LAYOUT_STABLE | View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN | View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION\
                );\
              }' "$MAIN"
          fi

      - name: Configurar capacitor.config.json
        run: |
          cat > capacitor.config.json << 'JSON'
          {
            "appId": "io.upanime.app",
            "appName": "UpAnime+",
            "webDir": "dist",
            "server": {
              "androidScheme": "https"
            },
            "android": {
              "buildOptions": {
                "keystorePath": "upanime.keystore",
                "keystoreAlias": "upanime",
                "keystorePassword": "upanime2026",
                "keystoreAliasPassword": "upanime2026"
              }
            },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 0
              }
            }
          }
          JSON

      - name: Decodificar Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upanime.keystore

      - name: Configurar assinatura no build.gradle
        run: |
          cat >> android/app/build.gradle << 'GRADLE'

          android {
              signingConfigs {
                  release {
                      storeFile file("upanime.keystore")
                      storePassword "upanime2026"
                      keyAlias "upanime"
                      keyPassword "upanime2026"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }
          }
          GRADLE

      - name: Build APK Release (assinado)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Renomear APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk upanime-plus.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: upanime-plus-apk
          path: upanime-plus.apk
          retention-days: 30

      - name: Criar Release automático
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ github.run_number }}
          name: "UpAnime+ v${{ github.run_number }}"
          files: upanime-plus.apk
          body: |
            ## UpAnime+ APK
            APK assinado e pronto para instalar.
            Baixe o arquivo `upanime-plus.apk` abaixo.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
