name: Build APK UpAnime+

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar dependências
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build web (Vite)
        run: npm run build
        env:
          VITE_CONSUMET_URL: ${{ secrets.VITE_CONSUMET_URL }}

      - name: Inicializar Android
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Configurar Estilos Fullscreen
        run: |
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/styles.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowContentOverlay">@null</item>
                  <item name="android:statusBarColor">@android:color/transparent</item>
                  <item name="android:navigationBarColor">@android:color/black</item>
              </style>
          </resources>
          XML

      - name: Decodificar Keystore
        run: |
          # O parâmetro --ignore-garbage ajuda se o segredo no GitHub tiver espaços ou quebras de linha
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode --ignore-garbage > android/app/upanime.keystore

      - name: Configurar Assinatura
        run: |
          # Reescreve o bloco de assinatura para garantir que não haja duplicatas
          cat >> android/app/build.gradle << 'GRADLE'
          android {
              signingConfigs {
                  release {
                      storeFile file("upanime.keystore")
                      storePassword "upanime2026"
                      keyAlias "upanime"
                      keyPassword "upanime2026"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          GRADLE

      - name: Build APK Release
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: upanime-plus-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          
