name: Build APK UpAnime+

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar dependências
        run: npm install

      - name: Build Vite
        run: npm run build

      - name: Instalar Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Adicionar plataforma Android
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix Kotlin duplicado
        run: |
          cat >> android/build.gradle << 'GRADLE'
          subprojects {
            configurations.all {
              resolutionStrategy {
                force "org.jetbrains.kotlin:kotlin-stdlib:1.9.0"
                force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.0"
                force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.0"
              }
            }
          }
          GRADLE

      - name: Tela cheia imersiva
        run: |
          MAIN=$(find android/app/src/main/java -name "MainActivity.java" | head -1)
          if [ -f "$MAIN" ]; then
            sed -i 's/import com.getcapacitor.BridgeActivity;/import com.getcapacitor.BridgeActivity;\nimport android.os.Build;\nimport android.view.WindowInsets;\nimport android.view.WindowInsetsController;/' "$MAIN"
            sed -i '/super.onCreate/a \        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {\n            getWindow().getInsetsController().hide(WindowInsets.Type.statusBars() | WindowInsets.Type.navigationBars());\n            getWindow().getInsetsController().setSystemBarsBehavior(WindowInsetsController.BEHAVIOR_SHOW_TRANSIENT_BARS_BY_SWIPE);\n        }' "$MAIN"
          fi

      - name: Decodificar Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upanime.keystore

      - name: Configurar assinatura no gradle.properties
        run: |
          cat >> android/gradle.properties << 'EOF'
          RELEASE_STORE_FILE=upanime.keystore
          RELEASE_STORE_PASSWORD=upanime2026
          RELEASE_KEY_ALIAS=upanime
          RELEASE_KEY_PASSWORD=upanime2026
          EOF

      - name: Injetar signingConfig no app/build.gradle
        run: |
          python3 << 'PYEOF'
          import re

          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          signing = """
              signingConfigs {
                  release {
                      storeFile file(RELEASE_STORE_FILE)
                      storePassword RELEASE_STORE_PASSWORD
                      keyAlias RELEASE_KEY_ALIAS
                      keyPassword RELEASE_KEY_PASSWORD
                  }
              }
          """

          # Adiciona signingConfigs dentro do bloco android{}
          if 'signingConfigs' not in content:
              content = content.replace('android {', 'android {' + signing, 1)

          # Configura release para usar o signingConfig
          content = re.sub(
              r'(release\s*\{)',
              r'\1\n            signingConfig signingConfigs.release',
              content,
              count=1
          )

          with open('android/app/build.gradle', 'w') as f:
              f.write(content)

          print("✅ build.gradle atualizado")
          PYEOF

      - name: Build APK Release
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Renomear APK
        run: |
          find android/app/build/outputs/apk/ -name "*.apk" -type f
          cp android/app/build/outputs/apk/release/app-release.apk upanime-plus.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: upanime-plus-apk
          path: upanime-plus.apk
          retention-days: 30

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ github.run_number }}
          name: "UpAnime+ v${{ github.run_number }}"
          files: upanime-plus.apk
          body: |
            APK assinado — baixe `upanime-plus.apk` abaixo.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
