name: Build APK UpAnime+

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar dependências
        run: npm install

      # 1. CRIAR CONFIGURAÇÃO PRIMEIRO
      - name: Configurar capacitor.config.json
        run: |
          cat > capacitor.config.json << 'JSON'
          {
            "appId": "io.upanime.app",
            "appName": "UpAnime+",
            "webDir": "dist",
            "server": { "androidScheme": "https" }
          }
          JSON

      - name: Build web (Vite)
        run: npm run build
        env:
          VITE_CONSUMET_URL: ${{ secrets.VITE_CONSUMET_URL }}

      # 2. SINCRONIZAR ANDROID
      - name: Inicializar Capacitor Android
        run: |
          npm install @capacitor/android
          npx cap add android || true
          npx cap sync android

      # 3. CONFIGURAR ASSINATURA E KEYSTORE
      - name: Decodificar Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upanime.keystore

      - name: Configurar build.gradle
        run: |
          cat >> android/app/build.gradle << 'GRADLE'
          android {
              signingConfigs {
                  release {
                      storeFile file("upanime.keystore")
                      storePassword "upanime2026"
                      keyAlias "upanime"
                      keyPassword "upanime2026"
                      storeType "PKCS12"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }
          }
          GRADLE

      # 4. BUILD DO APK
      - name: Build APK Release
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: upanime-plus-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          
